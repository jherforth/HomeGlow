name: CI Tests

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            path: ./client
          - name: backend
            path: ./server

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies (${{ matrix.name }})
        run: npm install
        working-directory: ${{ matrix.path }}

      - name: Run tests (${{ matrix.name }})
        run: npm test
        working-directory: ${{ matrix.path }}
